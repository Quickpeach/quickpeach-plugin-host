name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Verify and package only; do not publish to crates.io or push a tag
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Resolve release versions
        id: version
        shell: bash
        run: |
          export CRATE_NAME="quickpeach-plugin-host"

          # Determine baseline: latest git tag > crates.io published > Cargo.toml current
          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"

          if [[ -n "${LAST_TAG}" ]]; then
            BASELINE_VERSION="${LAST_TAG#v}"
          else
            BASELINE_VERSION="$(python - <<'PY'
          import json, os, pathlib, re, urllib.error, urllib.request

          crate_name = os.environ["CRATE_NAME"]
          try:
              with urllib.request.urlopen(f"https://crates.io/api/v1/crates/{crate_name}", timeout=30) as r:
                  data = json.load(r)
              version = data.get("crate", {}).get("max_stable_version") or data.get("crate", {}).get("newest_version") or ""
              if version:
                  print(version)
                  raise SystemExit(0)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          text = pathlib.Path("Cargo.toml").read_text(encoding="utf-8")
          match = re.search(r'(^|\n)\[package\][\s\S]*?\nversion = "([^"]+)"', text)
          print(match.group(2) if match else "0.1.0")
          PY
          )"
          fi

          IFS='.' read -r major minor patch <<< "${BASELINE_VERSION}"
          RELEASE_VERSION="${major}.${minor}.$((patch + 1))"
          RELEASE_TAG="v${RELEASE_VERSION}"

          VAULT_CORE_VERSION="$(python - <<'PY'
          import json, urllib.error, urllib.request

          try:
              with urllib.request.urlopen("https://crates.io/api/v1/crates/peachnote-vault-core", timeout=30) as r:
                  data = json.load(r)
              print(data.get("crate", {}).get("max_stable_version") or data.get("crate", {}).get("newest_version") or "")
          except urllib.error.HTTPError as exc:
              print("") if exc.code == 404 else (_ for _ in ()).throw(exc)
          PY
          )"

          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "vault_core_version=${VAULT_CORE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Update Cargo.toml for release
        shell: bash
        run: |
          export RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          export VAULT_CORE_VERSION="${{ steps.version.outputs.vault_core_version }}"
          python - <<'PY'
          import os, pathlib, re

          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")

          text, n = re.subn(
              r'(^|\n)(\[package\][\s\S]*?\nversion = ")([^"]+)(")',
              rf'\1\2{os.environ["RELEASE_VERSION"]}\4',
              text, count=1,
          )
          if n != 1:
              raise SystemExit("Could not update package version in Cargo.toml")

          vault_core_version = os.environ.get("VAULT_CORE_VERSION", "").strip()
          if vault_core_version:
              text, n = re.subn(
                  r'peachnote-vault-core\s*=\s*(\{[^}]*\}|"[^"]+")',
                  f'peachnote-vault-core = "{vault_core_version}"',
                  text, count=1,
              )
              if n != 1:
                  raise SystemExit("Could not rewrite peachnote-vault-core dependency in Cargo.toml")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Refresh Cargo.lock
        if: steps.version.outputs.vault_core_version != ''
        run: cargo update -p peachnote-vault-core --precise "${{ steps.version.outputs.vault_core_version }}"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Package crate
        run: cargo package --allow-dirty

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        shell: bash
        run: |
          echo "Prepared quickpeach-plugin-host ${{ steps.version.outputs.release_version }} (vault-core: ${{ steps.version.outputs.vault_core_version }})." >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run — nothing published or pushed." >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate with crates.io
        if: github.event_name == 'push' || inputs.dry_run != true
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: github.event_name == 'push' || inputs.dry_run != true
        run: cargo publish --allow-dirty --token "${{ steps.auth.outputs.token }}"

      - name: Commit version bump and push tag
        if: github.event_name == 'push' || inputs.dry_run != true
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "release: ${RELEASE_TAG} [skip release]"
            git push origin HEAD:main
          fi
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        if: github.event_name == 'push' || inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
